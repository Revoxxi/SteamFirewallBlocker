name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: pwsh
        run: ./.github/scripts/compute-version.ps1

      - name: Generate release notes
        if: steps.version.outputs.should_release == 'true'
        shell: pwsh
        run: |
          ./.github/scripts/generate-release-notes.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -PreviousTag "${{ steps.version.outputs.previous_tag }}" `
            -Bump "${{ steps.version.outputs.bump }}" `
            -OutputPath "release-notes.md"

      - name: Setup MSVC
        if: steps.version.outputs.should_release == 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        if: steps.version.outputs.should_release == 'true'
        shell: pwsh
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          if (-not (Test-Path "build/SteamFirewallBlocker.exe")) {
            throw "Build failed: build/SteamFirewallBlocker.exe was not produced."
          }

      - name: Package release
        if: steps.version.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $dist = "dist/SteamFirewallBlocker-Windows-x64-v$version"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "build/SteamFirewallBlocker.exe" "$dist/SteamFirewallBlocker.exe"
          Copy-Item "README.md" "$dist/README.md"
          Compress-Archive -Path "$dist/*" -DestinationPath "dist/SteamFirewallBlocker-Windows-x64-v$version.zip" -Force

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Steam Firewall Blocker v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: dist/SteamFirewallBlocker-Windows-x64-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Skip summary
        if: steps.version.outputs.should_release != 'true'
        shell: pwsh
        run: Write-Host "Release skipped — no new commits since ${{ steps.version.outputs.previous_tag }}."
